name: Source Truth Check

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify source truth
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_qt.txt

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_qt.txt

      - name: Run source truth verifier
        shell: bash
        run: |
          set -o pipefail
          ./scripts/verify_source_truth.sh 2>&1 | tee source-truth-output.log

      - name: Preserve source truth output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-truth-output
          path: source-truth-output.log
          if-no-files-found: error
          retention-days: 7
